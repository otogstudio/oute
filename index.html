<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUTE&reg;</title>
  <meta name="description" content="Made in London">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta property="og:title" content="OUTE®">
  <meta property="og:description" content="Made in London">
  <meta property="og:image" content="https://oute.co.uk/images/header-logo.svg">
  <meta property="og:url" content="https://oute.co.uk">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <style>
    html {
      scroll-behavior: smooth;
    }

    ::selection {
      background: #F5D547;
      color: #3B2314;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      border-radius: 0;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.7;
      background: #fff;
      color: #3B2314;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: #3B2314;
    }

    .site {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    p {
      text-align: justify;
      text-align-last: center;
      text-wrap: pretty;
    }

    .logo {
      display: block;
      width: 200px;
      margin: 0 auto 2rem;
    }

    .about {
      margin-bottom: 3rem;
    }

    .about p + p {
      margin-top: 1rem;
    }

    .product {
      margin-bottom: 3rem;
    }

    .product-image {
      width: 75%;
      aspect-ratio: 1 / 1;
      background: #fff;
      border: 1px solid #3B2314;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product p + p {
      margin-top: 0.5rem;
    }

    .btn {
      display: inline-block;
      margin-top: 0.5rem;
      text-decoration: underline;
      cursor: default;
      pointer-events: none;
    }

    .sep {
      margin: 3rem -6rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      text-align: center;
      opacity: 0.5;
    }

    .sep::before,
    .sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #3B2314;
    }

    .footer p + p {
      margin-top: 0.5rem;
    }

    .footer {
      font-size: 0.75em;
      vertical-align: super;
      line-height: 1.4;
    }

    @media (max-width: 500px) {
      .site {
        padding: 2rem 1.25rem 3rem;
      }
    }
  </style>
</head>
<body>

  <div class="site" id="top">
    <img src="images/footer-logo.svg" alt="OUTE" style="width:60px;height:60px;">
  </div>

</body>
</html>
